configuration:

  inv1_link:
    name: Inverter 1 connection type
    description: >
      Select how inverter 1 is connected to Home Assistant.
      Choose "serial" for a direct USB/RS232 connection or "gateway"
      if you are using a TCP/IP network gateway such as an Elfin EW11
      or compatible device.

  inv1_serial_port:
    name: Inverter 1 serial port
    description: >
      Serial port path used to communicate with inverter 1.
      Example: /dev/serial/by-id/usb-XXXX.
      Used only when connection type is set to "serial".

  inv1_gateway_host:
    name: Inverter 1 gateway IP address
    description: >
      IP address of the TCP/IP gateway connected to inverter 1.
      Example: 192.168.1.100.
      Used only when connection type is set to "gateway".

  inv1_gateway_port:
    name: Inverter 1 gateway TCP port
    description: >
      TCP port used by the network gateway.
      Most Elfin gateways use port 8899 by default.

  inv1_display_mode:
    name: Inverter 1 display mode
    description: >
      Select the operating mode that matches your inverter model.
      "modern" is recommended for most recent models.
      "legacy" is intended for older compatible models.

  inv1_output_priority_2choices:
    name: Simplified output priority mode
    description: >
      Enable this option if your inverter supports only two
      output priority modes instead of the standard three choices.

  inv2_link:
    name: Inverter 2 connection type
    description: >
      Select how inverter 2 is connected to Home Assistant.

  inv2_serial_port:
    name: Inverter 2 serial port
    description: >
      Serial port path used to communicate with inverter 2.

  inv2_gateway_host:
    name: Inverter 2 gateway IP address
    description: >
      IP address of the TCP/IP gateway connected to inverter 2.

  inv2_gateway_port:
    name: Inverter 2 gateway TCP port
    description: >
      TCP port used by the network gateway connected to inverter 2.

  inv2_display_mode:
    name: Inverter 2 display mode
    description: >
      Select the operating mode that matches your inverter model.

  inv2_output_priority_2choices:
    name: Simplified output priority mode
    description: >
      Enable this option if your inverter supports only two
      output priority choices.

  inv3_link:
    name: Inverter 3 connection type
    description: >
      Select how inverter 3 is connected to Home Assistant.

  inv3_serial_port:
    name: Inverter 3 serial port
    description: >
      Serial port path used to communicate with inverter 3.

  inv3_gateway_host:
    name: Inverter 3 gateway IP address
    description: >
      IP address of the TCP/IP gateway connected to inverter 3.

  inv3_gateway_port:
    name: Inverter 3 gateway TCP port
    description: >
      TCP port used by the network gateway connected to inverter 3.

  inv3_display_mode:
    name: Inverter 3 display mode
    description: >
      Select the operating mode that matches your inverter model.

  inv3_output_priority_2choices:
    name: Simplified output priority mode
    description: >
      Enable this option if your inverter supports only two
      output priority choices.

  battery_section:
    name: Battery configuration
    description: >
      Parameters used for energy calculations,
      statistics and advanced dashboard features.

  battery_system_voltage:
    name: Battery system voltage
    description: >
      Select the nominal voltage of your battery system.
      Use 24V for 24-volt systems and 48V for 48-volt systems.

  mqtt_section:
    name: MQTT configuration
    description: >
      Connection settings for the MQTT broker used to publish
      data to Home Assistant.

  mqtt_host:
    name: MQTT broker address
    description: >
      Hostname or IP address of your MQTT broker.
      When using the Mosquitto Home Assistant add-on,
      "core-mosquitto" is usually the correct value.

  mqtt_port:
    name: MQTT broker port
    description: >
      Port used to connect to the MQTT broker.
      The default MQTT port is usually 1883.

  mqtt_user:
    name: MQTT username
    description: >
      Username used to authenticate with the MQTT broker.

  mqtt_pass:
    name: MQTT password
    description: >
      Password associated with the MQTT account.

  premium_section:
    name: Premium license
    description: >
      Settings related to Premium feature activation.

  premium_key:
    name: Premium license key
    description: >
      Enter your Smart Voltronic Premium license key.

      A valid license unlocks advanced features,
      extended statistics, Premium dashboards,
      and future Premium-only functionality.

  inv1_battery_capacity_ah:
    name: Inverter 1 battery capacity (Ah)
    description: >
      Total battery bank capacity connected to inverter 1,
      expressed in amp-hours (Ah).

  inv1_battery_total_capacity_kwh:
    name: Inverter 1 battery capacity (kWh)
    description: >
      Total battery bank energy capacity connected to inverter 1.

      This information is used by advanced calculations,
      Premium statistics and dashboard displays.

  inv2_battery_capacity_ah:
    name: Inverter 2 battery capacity (Ah)
    description: >
      Total battery bank capacity connected to inverter 2.

  inv2_battery_total_capacity_kwh:
    name: Inverter 2 battery capacity (kWh)
    description: >
      Total battery bank energy capacity connected to inverter 2.

  inv3_battery_capacity_ah:
    name: Inverter 3 battery capacity (Ah)
    description: >
      Total battery bank capacity connected to inverter 3.

  inv3_battery_total_capacity_kwh:
    name: Inverter 3 battery capacity (kWh)
    description: >
      Total battery bank energy capacity connected to inverter 3.

  dashboard_section:
    name: Premium dashboard
    description: >
      Settings related to automatic dashboard generation.

  dashboard_custom_cards_installed:
    name: Custom Lovelace cards installed
    description: >
      Enable this option only if all required custom Lovelace cards
      have already been installed.

      This option is not required when using HTML dashboards.

  premium_dashboard_output:
    name: Dashboard generation mode
    description: >
      Select which dashboard type should be generated automatically.

      • Lovelace : standard Home Assistant dashboard.

      • HTML : modern standalone Smart Energy Premium dashboard.

      • Both : generate Lovelace and HTML dashboards.

      • Disabled : disable automatic dashboard generation.

      HTML mode requires an active Premium license.

  send_bip:
    name: Enable inverter buzzer
    description: >
      When enabled, the inverter will emit an audible beep
      when certain settings are modified from Home Assistant.

  timezone_section:
    name: Timezone
    description: >
      Settings used for daily, monthly and yearly statistics.

  timezone_mode:
    name: Timezone selection
    description: >
      Select the timezone used to calculate
      energy counters and historical statistics.

  timezone_custom:
    name: Custom timezone
    description: >
      Used only when CUSTOM mode is selected.

      Example: Europe/Paris, America/New_York or Asia/Tokyo.
