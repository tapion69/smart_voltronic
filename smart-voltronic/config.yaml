name: "Smart Voltronic Node-RED"
version: "1.8.5"
slug: smart_voltronic
description: "Node-RED Voltronic plug & play: flow mis à jour via MAJ add-on"

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

startup: services
boot: auto
init: false
uart: true

ports:
  1892/tcp: 1892

panel_icon: mdi:solar-power

options:
  # ============================================================
  # ⚡ ONDULEUR 1
  # ============================================================
  inv1_link: "serial"
  inv1_serial_port: "/dev/serial/by-id/CHANGE-ME-1"
  inv1_gateway_host: ""
  inv1_gateway_port: 8899
  inv1_display_mode: "modern"
  inv1_output_priority_2choices: false

  # ============================================================
  # ⚡ ONDULEUR 2
  # ============================================================
  inv2_link: "serial"
  inv2_serial_port: "/dev/serial/by-id/CHANGE-ME-2"
  inv2_gateway_host: ""
  inv2_gateway_port: 8899
  inv2_display_mode: "modern"
  inv2_output_priority_2choices: false

  # ============================================================
  # ⚡ ONDULEUR 3
  # ============================================================
  inv3_link: "serial"
  inv3_serial_port: "/dev/serial/by-id/CHANGE-ME-3"
  inv3_gateway_host: ""
  inv3_gateway_port: 8899
  inv3_display_mode: "modern"
  inv3_output_priority_2choices: false

  # ============================================================
  # 🔋 BATTERY SYSTEM VOLTAGE
  # ============================================================
  battery_section: "────────── BATTERY ──────────"
  battery_system_voltage: "48V"

  # ============================================================
  # 📡 MQTT CONFIGURATION
  # ============================================================
  mqtt_section: "────────── MQTT CONFIGURATION ──────────"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""

  # ============================================================
  # 🔔 OPTIONS
  # ============================================================
  send_bip: true

  # ============================================================
  # 🌍 TIMEZONE
  # ============================================================
  timezone_section: "────────── TIMEZONE ──────────"
  timezone_mode: "Europe/Paris"
  timezone_custom: "UTC"

schema:
  # Onduleur 1
  inv1_link: list(serial|gateway)
  inv1_serial_port: str?
  inv1_gateway_host: str?
  inv1_gateway_port: int?
  inv1_display_mode: list(modern|legacy_usb_sub_sbu)
  inv1_output_priority_2choices: bool

  # Onduleur 2
  inv2_link: list(serial|gateway)
  inv2_serial_port: str?
  inv2_gateway_host: str?
  inv2_gateway_port: int?
  inv2_display_mode: list(modern|legacy_usb_sub_sbu)
  inv2_output_priority_2choices: bool

  # Onduleur 3
  inv3_link: list(serial|gateway)
  inv3_serial_port: str?
  inv3_gateway_host: str?
  inv3_gateway_port: int?
  inv3_display_mode: list(modern|legacy_usb_sub_sbu)
  inv3_output_priority_2choices: bool

  # Séparateur Battery
  battery_section: str?

  # Battery system voltage
  battery_system_voltage: list(24V|48V)

  # Séparateur MQTT
  mqtt_section: str?

  # MQTT
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: password

  # Options
  send_bip: bool

  # Séparateur Timezone
  timezone_section: str?

  # Timezone
  timezone_mode: list(Europe/Paris|Europe/Berlin|Europe/Brussels|Europe/Madrid|Europe/Rome|Europe/London|America/New_York|America/Chicago|America/Los_Angeles|America/Montreal|Asia/Dubai|Asia/Tokyo|Australia/Sydney|CUSTOM)
  timezone_custom: str?
